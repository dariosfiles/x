<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WhatsApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #111b21;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  #shell {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111b21;
  }

  #chat-container {
    width: 430px;
    height: 100vh;
    max-height: 860px;
    display: flex;
    flex-direction: column;
    background: #0b141a;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0,0,0,0.9);
  }

  @media (max-width: 480px) {
    #chat-container {
      width: 100vw;
      height: 100vh;
      max-height: 100vh;
      box-shadow: none;
    }
  }

  .header {
    background: #202c33;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .back-arrow { color: #aebac1; font-size: 22px; cursor: pointer; line-height: 1; user-select: none; }

  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #2a3942;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .contact-info { flex: 1; min-width: 0; }
  .contact-name  { color: #e9edef; font-size: 16px; font-weight: 500; }
  .contact-status { color: #8696a0; font-size: 12px; }

  .header-icons { display: flex; gap: 16px; }
  .header-icons svg { cursor: pointer; }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: #0b141a;
  }

  .date-sep { text-align: center; margin-bottom: 14px; }
  .date-sep span {
    background: #1d2f3a; color: #8696a0;
    font-size: 12px; padding: 5px 14px; border-radius: 8px;
  }

  .bubble-wrap { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 4px; }

  .bubble {
    background: #202c33;
    border-radius: 0 10px 10px 10px;
    padding: 8px 72px 8px 10px;
    max-width: 80%;
    position: relative;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .bubble::before {
    content: '';
    position: absolute;
    top: 0; left: -8px;
    width: 0; height: 0;
    border-top: 8px solid #202c33;
    border-left: 8px solid transparent;
  }

  .bubble-text  { color: #e9edef; font-size: 14.5px; line-height: 1.45; word-break: break-word; }
  .bubble-time  { position: absolute; bottom: 5px; right: 8px; color: #8696a0; font-size: 11px; white-space: nowrap; }

  .input-bar {
    background: #202c33;
    padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: #2a3942;
    border-radius: 24px;
    padding: 9px 14px;
    display: flex; align-items: center; gap: 10px;
  }

  .input-wrap input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: #e9edef; font-size: 15px;
    caret-color: #00a884; font-family: inherit;
  }
  .input-wrap input::placeholder { color: #8696a0; }

  .send-btn {
    width: 48px; height: 48px;
    border-radius: 50%; background: #00a884;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  .send-btn:hover { background: #017a62; }

  /* PRANK — cubre TODO el viewport */
  #prank-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 99999;
    background: #000;
  }

  #prank-overlay img {
    width: 100%; height: 100%;
    object-fit: fill;
    display: block;
  }
</style>
</head>
<body>

<div id="shell">
  <div id="chat-container">

    <div class="header">
      <div class="back-arrow">&#8592;</div>
      <div class="avatar">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#8696a0">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
      <div class="contact-info">
        <div class="contact-name">+34 633 . . .</div>
        <div class="contact-status">último acceso hoy a las 12:45</div>
      </div>
      <div class="header-icons">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#aebac1">
          <path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.47 11.47 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.58a1 1 0 01-.24 1.01l-2.21 2.2z"/>
        </svg>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#aebac1">
          <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
        </svg>
      </div>
    </div>

    <div class="chat-area">
      <div class="date-sep"><span>HOY</span></div>
      <div class="bubble-wrap">
        <div class="bubble">
          <div class="bubble-text">Responde para que sepa que eres tú cuando puedas porfavor!</div>
          <div class="bubble-time">12:47</div>
        </div>
      </div>
    </div>

    <div class="input-bar" id="inputBar">
      <div class="input-wrap">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#8696a0">
          <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
        </svg>
        <input type="text" id="msgInput" placeholder="Mensaje" autocomplete="off" spellcheck="false" />
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#8696a0">
          <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6.91 6c-.49 0-.9.36-.98.85C16.52 15.2 14.47 17 12 17s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V21c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
        </svg>
      </div>
      <button class="send-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<div id="prank-overlay">
  <img id="prank-img" src="" alt="" />
</div>

<audio id="prankAudio" loop preload="auto">
  <source src="https://files.catbox.moe/7ei131.mp3" type="audio/mpeg">
</audio>

<script>
  const input      = document.getElementById('msgInput');
  const overlay    = document.getElementById('prank-overlay');
  const audio      = document.getElementById('prankAudio');
  const inputBar   = document.getElementById('inputBar');
  const prankImg   = document.getElementById('prank-img');
  let triggered    = false;

  function goFullscreen() {
    const el = document.documentElement;
    const fn = el.requestFullscreen
            || el.webkitRequestFullscreen
            || el.mozRequestFullScreen
            || el.msRequestFullscreen;
    if (fn) fn.call(el).catch(() => {});
  }

  // Cualquier click/toque en la página → pantalla completa (incluso antes del prank)
  document.addEventListener('click',      goFullscreen, { once: false });
  document.addEventListener('touchstart', goFullscreen, { passive: true });

  function activate() {
    if (triggered) return;
    triggered = true;

    goFullscreen();

    prankImg.src = 'https://i.imgflip.com/7c04fj.jpg';
    overlay.style.display = 'block';
    inputBar.style.display = 'none';

    audio.volume = 1.0;
    audio.play().catch(() => {});
  }

  input.addEventListener('input',   activate);
  input.addEventListener('keydown', function(e) {
    if (e.key && e.key.length === 1) activate();
  });
</script>
</body>
</html>
